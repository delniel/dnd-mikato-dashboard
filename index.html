<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15161a" />
    <meta name="description" content="Локальный лист персонажа DnD Mikato Edition" />
    <link rel="icon" href="%BASE_URL%favicon.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>DnD MGE — лист персонажа</title>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          const scopePath = new URL(document.baseURI).pathname
          registrations.filter((registration) => new URL(registration.scope).pathname.startsWith(scopePath)).forEach((registration) => registration.unregister())
        })
      }
      if ('caches' in window) caches.keys().then((keys) => keys.filter((key) => key.startsWith('urumir-')).forEach((key) => caches.delete(key)))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
